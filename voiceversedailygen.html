    // ── Persistent Memory ──────────
    const STORAGE_KEY = 'lumina_memory';

    function loadMemory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (e) {}
      return { recentVerses: [], recentImages: [], recentSongs: [] };
    }

    function saveMemory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ recentVerses, recentImages, recentSongs }));
      } catch (e) {}
    }

    const mem = loadMemory();
    let recentVerses = mem.recentVerses || [];
    let recentImages = mem.recentImages || [];
    let recentSongs  = mem.recentSongs  || [];

    // Sync memory across multiple tabs
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY && e.newValue) {
        try {
          const updatedMem = JSON.parse(e.newValue);
          recentVerses = updatedMem.recentVerses || [];
          recentImages = updatedMem.recentImages || [];
          recentSongs = updatedMem.recentSongs || [];
          console.log('Memory synced from another tab');
        } catch (err) {
          console.error('Failed to sync memory:', err);
        }
      }
    });

    // Get Random Verse
    function getRandomVerse() {
      let candidates = verses.filter(v => !recentVerses.includes(v.reference));
      if (candidates.length === 0) {
        candidates = verses;
        recentVerses = [];
      }
      const selected = candidates[Math.floor(Math.random() * candidates.length)];
      recentVerses.push(selected.reference);
      if (recentVerses.length > 300) recentVerses.shift();
      saveMemory();
      return selected;
    }

    // Get Image URL
    function getImageUrl() {
      let randomId;
      do {
        randomId = Math.floor(Math.random() * 10000) + 1;
      } while (recentImages.includes(randomId));
      recentImages.push(randomId);
      if (recentImages.length > 50) recentImages.shift();
      saveMemory();
      return `https://picsum.photos/1080/1920?random=${randomId}`;
    }

    // Get Random Song
    function getRandomSong() {
      if (userAudioFile) {
        return userAudioFile.name.split('.').slice(0, -1).join('.');
      }
      let candidates = songs.filter(s => !recentSongs.includes(s));
      if (candidates.length === 0) {
        candidates = songs;
        recentSongs = [];
      }
      const selected = candidates[Math.floor(Math.random() * candidates.length)];
      recentSongs.push(selected);
      if (recentSongs.length >= songs.length) recentSongs.shift();
      saveMemory();
      return selected;
    }

    // Fetch song preview from iTunes API
    async function fetchSongPreview(songName) {
      try {
        const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(songName)}&limit=1&entity=song`);
        const data = await response.json();
        if (data.results && data.results.length > 0 && data.results[0].previewUrl) {
          return data.results[0].previewUrl;
        }
      } catch (err) {
        console.warn('Failed to fetch song preview:', err);
      }
      return null;
    }

      if (file) {
        userAudioFile = file;
        const url = URL.createObjectURL(file);

        audioFilename.innerText = file.name;
        audioStatus.classList.remove('hidden');
        document.getElementById('song-name').innerText = file.name.split('.').slice(0, -1).join('.');
        currentSongPreviewUrl = null;
        lucide.createIcons();
      }
    }

      bgImage.classList.remove('opacity-100');
      verseText.classList.remove('opacity-100');
      verseRef.classList.remove('opacity-100');
      const songContainer = document.getElementById('song-label-container');
      if (songContainer) songContainer.classList.remove('opacity-100');
      
      setTimeout(async () => {
        const verse = getRandomVerse();
        const url = getImageUrl();
        const song = getRandomSong();
        const img = new Image();
        
        const handleSuccess = async (finalUrl) => {
          bgImage.src = finalUrl;
          verseText.innerText = `"${verse.text}"`;
          verseRef.innerText = `— ${verse.reference} —`;
          document.getElementById('song-name').innerText = song;
          
          if (!userAudioFile) {
            const previewUrl = await fetchSongPreview(song);
            if (previewUrl) {
              currentSongPreviewUrl = previewUrl;
              audioPlayer.src = previewUrl;
            }
          }
          
          requestAnimationFrame(() => {
            bgImage.classList.add('opacity-100');
            verseText.classList.add('opacity-100');
            verseRef.classList.add('opacity-100');
            if (songContainer) songContainer.classList.add('opacity-100');
            isGenerating = false;
            generateBtn.disabled = false;
            downloadBtn.disabled = false;
            generateIcon.classList.remove('spin');
          });
        };

        img.onload = () => handleSuccess(img.src);
        img.onerror = () => {
          const retryUrl = `https://picsum.photos/1080/1920?random=${Math.floor(Math.random() * 10000) + 1}`;
          const retryImg = new Image();
          retryImg.onload = () => handleSuccess(retryUrl);
          retryImg.onerror = () => handleSuccess('');
          retryImg.src = retryUrl;
        };
        img.src = url;
      }, 500);
    }

    // Render frame to canvas
    async function renderFrameToCanvas() {
      // Lower resolution for much faster encoding (720x1280 is still HD)
      const W = 720, H = 1280;
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      function wrapText(context, text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let line = '';
        for (const word of words) {
          const test = line ? line + ' ' + word : word;
          if (context.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
        return lines;
      }

      function roundRect(context, x, y, w, h, r) {
        context.beginPath();
        context.moveTo(x + r, y);
        context.lineTo(x + w - r, y);
        context.quadraticCurveTo(x + w, y, x + w, y + r);
        context.lineTo(x + w, y + h - r);
        context.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        context.lineTo(x + r, y + h);
        context.quadraticCurveTo(x, y + h, x, y + h - r);
        context.lineTo(x, y + r);
        context.quadraticCurveTo(x, y, x + r, y);
        context.closePath();
      }

      const existingImg = document.getElementById('bg-image');
      const currentSrc = existingImg.src;
      await new Promise((resolve) => {
        if (!currentSrc) {
          ctx.fillStyle = '#0a0a0a';
          ctx.fillRect(0, 0, W, H);
          return resolve();
        }
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const scale = Math.max(W / img.naturalWidth, H / img.naturalHeight);
          const sw = img.naturalWidth * scale, sh = img.naturalHeight * scale;
          ctx.drawImage(img, (W - sw) / 2, (H - sh) / 2, sw, sh);
          resolve();
        };
        img.onerror = () => {
          ctx.fillStyle = '#111827';
          ctx.fillRect(0, 0, W, H);
          resolve();
        };
        img.src = currentSrc + (currentSrc.includes('?') ? '&' : '?') + 'cb=' + Date.now();
      });

      const grad = ctx.createLinearGradient(0, H, 0, 0);
      grad.addColorStop(0, 'rgba(0,0,0,0.92)');
      grad.addColorStop(0.45, 'rgba(0,0,0,0.40)');
      grad.addColorStop(1, 'rgba(0,0,0,0.30)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      const verseStr = document.getElementById('verse-text').innerText;
      const refStr = document.getElementById('verse-ref').innerText;
      const songStr = document.getElementById('song-name').innerText;
      const margin = 70, maxW = W - margin * 2;

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.85)';
      ctx.shadowBlur = 20;
      // Adjusted font size for lower resolution
      ctx.font = 'italic 600 48px Georgia, serif';
      ctx.fillStyle = '#ffffff';
      const verseLines = wrapText(ctx, verseStr, maxW);
      const lineH = 64, totalH = verseLines.length * lineH;
      const startY = H / 2 - totalH / 2 - 40;
      verseLines.forEach((line, i) => ctx.fillText(line, W / 2, startY + i * lineH));

      ctx.shadowBlur = 10;
      ctx.font = '300 24px Georgia, serif';
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.fillText(refStr, W / 2, startY + totalH + 50);

      // Watermark and song label removed for cleaner video output as requested
      /*
      ctx.shadowBlur = 0;
      const pillY = H - 230, pillH = 66, padX = 52;
      ctx.font = '400 28px Arial, sans-serif';
      const label = '\u266B  ' + songStr;
      const pillW = Math.min(ctx.measureText(label).width + padX * 2, maxW);
      const pillX = (W - pillW) / 2;
      ctx.fillStyle = 'rgba(0,0,0,0.50)';
      roundRect(ctx, pillX, pillY - pillH / 2, pillW, pillH, pillH / 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.fillText(label, W / 2, pillY);

      ctx.font = '300 26px Arial, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.30)';
      ctx.fillText('CREATED WITH LUMINA', W / 2, H - 72);
      */

      return canvas;
    }

    // Download video with audio
    async function downloadVideo() {
      downloadBtn.disabled = true;
      const refStr = document.getElementById('verse-ref').innerText;

      downloadBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 spin"></i><span class="font-medium text-sm">Rendering frame…</span>';
      lucide.createIcons();

      let frameCanvas;
      try {
        frameCanvas = await renderFrameToCanvas();
      } catch (err) {
        alert('Render failed: ' + err.message);
        downloadBtn.disabled = false;
        downloadBtn.innerHTML = `<i data-lucide="video" class="w-5 h-5"></i><span class="font-medium text-sm">Download Video with Audio</span>`;
        lucide.createIcons();
        return;
      }

      // Determine audio source and duration
      let audioSource = null;
      let audioBuffer = null;
      let duration = 5; // Aggressive: 5 seconds default

      if (audioPlayer.src) {
        try {
          const response = await fetch(audioPlayer.src);
          audioBuffer = await response.arrayBuffer();
          
          // Try to get duration from audio element
          if (audioPlayer.duration && audioPlayer.duration !== Infinity) {
            // Limit to 10s for preview audio, keep user upload longer but capped
            duration = userAudioFile ? Math.min(audioPlayer.duration, 30) : 10;
          }
        } catch (err) {
          console.warn('Could not fetch audio:', err);
        }
      }

      // Pick best supported mime type - prioritize MP4 with AAC audio
      const mimeTypes = [
        'video/mp4;codecs="avc1.42E01E,mp4a.40.2"',
        'video/mp4;codecs=avc1',
        'video/mp4',
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm'
      ];
      const mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/mp4';
      const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';
      console.log('Using MIME type:', mimeType);

      // Create canvas stream
      const RW = 720, RH = 1280;
      const recCanvas = document.createElement('canvas');
      recCanvas.width = RW;
      recCanvas.height = RH;
      const rctx = recCanvas.getContext('2d');

      rctx.drawImage(frameCanvas, 0, 0, RW, RH);
      // Aggressive: 5 FPS for static content
      const fps = 5;
      const paintInterval = setInterval(() => rctx.drawImage(frameCanvas, 0, 0, RW, RH), 1000 / fps);

      const canvasStream = recCanvas.captureStream(fps);
      let finalStream = canvasStream;

      // Add audio if available
      if (audioBuffer) {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const decodedAudio = await audioCtx.decodeAudioData(audioBuffer.slice(0));
          
          const offlineCtx = new OfflineAudioContext(
            decodedAudio.numberOfChannels,
            decodedAudio.sampleRate * duration,
            decodedAudio.sampleRate
          );
          
          const source = offlineCtx.createBufferSource();
          source.buffer = decodedAudio;
          source.connect(offlineCtx.destination);
          source.start(0);
          
          const renderedAudio = await offlineCtx.startRendering();
          const audioDestination = audioCtx.createMediaStreamDestination();
          const audioSource = audioCtx.createBufferSource();
          audioSource.buffer = renderedAudio;
          audioSource.connect(audioDestination);
          audioSource.start(0);
          
          const audioTrack = audioDestination.stream.getAudioTracks()[0];
          if (audioTrack) {
            finalStream = new MediaStream([
              ...canvasStream.getVideoTracks(),
              audioTrack
            ]);
          }
        } catch (err) {
          console.warn('Audio processing error:', err);
        }
      }

      const recorder = new MediaRecorder(finalStream, { 
        mimeType,
        audioBitsPerSecond: 128000
      });
      const chunks = [];
      recorder.ondataavailable = e => {
        if (e.data?.size > 0) chunks.push(e.data);
      };

      let elapsed = 0;
      const tick = setInterval(() => {
        elapsed++;
        const pct = Math.min(Math.round((elapsed / duration) * 100), 100);
        downloadBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 spin"></i><span class="font-medium text-sm">Encoding… ${pct}%</span>`;
        lucide.createIcons();
      }, 1000);

      recorder.start(100);
      await new Promise(resolve => setTimeout(resolve, duration * 1000));

      clearInterval(paintInterval);
      clearInterval(tick);

      await new Promise(resolve => {
        recorder.onstop = resolve;
        recorder.stop();
      });

      finalStream.getTracks().forEach(t => t.stop());

      // Download
      const blob = new Blob(chunks, { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const name = refStr.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
      link.download = `${name}.${ext}`;
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 2000);

      downloadBtn.disabled = false;
      downloadBtn.innerHTML = `<i data-lucide="video" class="w-5 h-5"></i><span class="font-medium text-sm">Download Video with Audio</span>`;
      lucide.createIcons();
    }

    generateNewVerse();
  </script>
